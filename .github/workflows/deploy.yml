name: Deploy to CRM VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 72.61.123.222
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 60s
          script: |
            cd /root/astraterra-crm || cd /home/ubuntu/astraterra-crm || cd ~/astraterra-crm
            git pull origin main
            pm2 restart crm-backend || pm2 restart all
            echo "Deploy complete"
